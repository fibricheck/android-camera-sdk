name: PR Validation

on:
  pull_request:
    branches: [main, master, dev]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Build SDK (includes tests) and verify example app compiles
      - name: Build and test
        run: ./gradlew clean :camerasdk:build :example-kotlin:assembleDebug
